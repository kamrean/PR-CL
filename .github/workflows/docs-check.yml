name: Docs Check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-check:
    name: Check required service-kit files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify required files exist
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f service_kit/repo_audit_checklist.md
          test -f service_kit/ci_red_report_template.md
          test -f service_kit/customer_workflow_install_guide.md
          test -f service_kit/ai_analysis_prompt.md
          test -f service_kit/private_intake_policy.md
          test -f service_kit/private_repo_access_authorization.md
          test -f service_kit/github_actions_security_baseline.md
          test -f service_kit/artifact_allowlist_and_redaction_policy.md
          test -f service_kit/preflight_security_checklist.md
          test -f workflow_templates/node-minimal-ci.yml
          test -f workflow_templates/python-minimal-ci.yml
          test -f automation/ci_red_triage/new-ci-red-report.ps1
          test -f automation/pr_review/new-pr-review-report.ps1

      - name: Check for obvious secret file names
        shell: bash
        run: |
          set -euo pipefail
          if find . -type f \
            \( -name ".env" -o -name ".env.*" -o -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name "*.pfx" \) \
            ! \( -name ".env.example" -o -name ".env.sample" -o -name ".env.template" -o -name ".env.test.example" \) | grep .; then
            echo "Potential secret files found. Remove or rename before commit."
            exit 1
          fi
