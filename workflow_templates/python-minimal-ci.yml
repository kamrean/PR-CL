name: Python Minimal CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Install and run minimal Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Install test tools if missing
        run: python -m pip install pytest

      - name: Run tests
        run: pytest

      # Intentionally no default artifact upload here.
      # If the repository owner explicitly approves low-risk debug uploads,
      # use workflow_templates/artifact-on-failure-snippet.yml.
