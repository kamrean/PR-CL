# Add this step near the end of a GitHub Actions job.
# Keep artifact uploads small and low risk by default.

- name: Upload safe debug artifacts on failure
  if: failure()
  uses: actions/upload-artifact@v4
  with:
    name: ci-debug-artifacts
    path: |
      ~/.npm/_logs
      .pytest_cache
      junit.xml
      pytest.xml
      coverage-summary.json
    if-no-files-found: ignore
    retention-days: 3
