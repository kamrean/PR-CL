name: Node Minimal CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Install and run configured checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Run build
        run: npm run build --if-present

      # Intentionally no default artifact upload here.
      # If the repository owner explicitly approves low-risk debug uploads,
      # use workflow_templates/artifact-on-failure-snippet.yml.
